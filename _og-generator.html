<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 1200px;
    height: 630px;
    background: #09090b;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }
  /* Grid pattern */
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
    background-size: 48px 48px;
    mask-image: radial-gradient(ellipse 70% 60% at 50% 50%, black 20%, transparent 70%);
  }
  /* Glow */
  body::after {
    content: '';
    position: absolute;
    top: -10%;
    left: 50%;
    transform: translateX(-50%);
    width: 800px;
    height: 500px;
    background: radial-gradient(ellipse, rgba(59,130,246,.15) 0%, rgba(167,139,250,.07) 40%, transparent 70%);
    pointer-events: none;
  }
  .content {
    position: relative;
    z-index: 1;
    text-align: center;
    color: #fafafa;
  }
  .brand {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    margin-bottom: 40px;
  }
  .brand-icon {
    width: 52px; height: 52px;
    background: linear-gradient(135deg, #3b82f6 0%, #a78bfa 100%);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .brand-icon svg { width: 28px; height: 28px; }
  .brand-name {
    font-size: 32px;
    font-weight: 700;
    letter-spacing: -.03em;
    background: linear-gradient(135deg, #60a5fa 0%, #a78bfa 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  h1 {
    font-size: 56px;
    font-weight: 800;
    letter-spacing: -.04em;
    line-height: 1.15;
    margin-bottom: 24px;
  }
  h1 .grad {
    background: linear-gradient(135deg, #60a5fa 0%, #a78bfa 50%, #c084fc 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .sub {
    font-size: 22px;
    color: #a1a1aa;
    font-weight: 400;
    margin-bottom: 36px;
  }
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(34,197,94,.1);
    border: 1px solid rgba(34,197,94,.25);
    color: #22c55e;
    font-size: 16px;
    font-weight: 600;
    padding: 10px 24px;
    border-radius: 100px;
  }
  .badge svg { width: 18px; height: 18px; }
</style>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
</head>
<body>
<div class="content">
  <div class="brand">
    <div class="brand-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/>
        <path d="M2 12h20"/>
      </svg>
    </div>
    <span class="brand-name">leggiraggi.it</span>
  </div>
  <h1>Leggi le tue <span class="grad">radiografie</span><br>in modo semplice</h1>
  <p class="sub">Visualizzatore DICOM gratuito, open-source e 100% locale</p>
  <div class="badge">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
    I tuoi dati non escono mai dal tuo dispositivo
  </div>
</div>
</body>
</html>
